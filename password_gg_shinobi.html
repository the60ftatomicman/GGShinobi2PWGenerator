<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shinobi GG Password Generator</title>
  <style>
    /* Retro/cheatsheet inspired layout (styling only — no structural changes) */
    :root{
      --bg:#f6f3ea;
      --card:#ffffff;
      --muted:#666;
      --accent:#0b66a3;
      --accent-2:#00a3e0;
      --panel:#faf7ef;
      --border:#d6cfc1;
    }

    html,body{
      height:100%;
    }

    body {
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg,var(--bg),#efeae0 60%);
      color: #1b1b1b;
      margin: 0;
      padding: 40px 20px;
      -webkit-font-smoothing:antialiased;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px 22px;
      max-width: 640px;
      margin: 0 auto;
      box-shadow: 0 8px 24px rgba(27,27,27,0.08);
      display: block;
    }

    /* two-column layout for ninjas/crystals */
    .cols{ display:flex; gap:12px; align-items:flex-start; }
    .col{ box-sizing:border-box; }
    .col.left{ width:50%; }
    .col.right{ width:50%; }
    /* ensure fieldsets inside columns fill width */
    .col fieldset{ width:100%; }

    h1{
      margin:0 0 10px 0;
      font-size:20px;
      letter-spacing:0.4px;
      color:var(--accent);
      font-weight:700;
    }

    form{
      margin-top:8px;
    }

    fieldset{
      border:1px solid var(--border);
      background:var(--panel);
      padding:12px 14px;
      border-radius:4px;
      margin:12px 0;
    }

    legend{
      padding:4px 8px;
      background:var(--accent);
      color:#fff;
      border-radius:4px;
      font-weight:700;
      font-size:0.85rem;
    }

    /* layout: two-column groups for checkboxes */
    fieldset > label{
      display:inline-flex;
      align-items:center;
      gap:8px;
      width:50%;
      box-sizing:border-box;
      padding:6px 0;
      color:var(--muted);
      font-size:0.95rem;
    }

    /* make checkboxes a little larger and clearer */
    input[type="checkbox"]{
      width:18px;
      height:18px;
      accent-color: var(--accent-2);
    }

    /* select and text output styling */
    select,
    input[type="text"]{
      width:100%;
      padding:8px 10px;
      border-radius:4px;
      border:1px solid var(--border);
      background:transparent;
      color:#111;
      margin-top:6px;
      box-sizing:border-box;
      font-size:0.95rem;
    }

    /* button style closer to the cheatsheet accent */
    button{
      display:inline-block;
      padding:10px 14px;
      border-radius:4px;
      border:2px solid var(--accent);
      background: linear-gradient(180deg,var(--accent),#0a5586);
      color:#fff;
      font-weight:700;
      font-size:0.98rem;
      cursor:pointer;
      width:100%;
      box-shadow:0 6px 12px rgba(11,102,163,0.12);
    }

    button:active{ transform: translateY(1px); }

    .output{
      margin-top:14px;
      display:flex;
      gap:8px;
      align-items:center;
      flex-direction:column;
    }

    .output label{
      width:100%;
      color:var(--muted);
      font-size:0.85rem;
    }

    /* emphasize the generated code with monospace and larger size */
    #password-output{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", monospace;
      font-size:1.25rem;
      letter-spacing:2px;
      text-align:center;
      padding:10px 12px;
      border:1px dashed var(--border);
      background: #fffef8;
      color:#0b3955;
    }

    /* responsive tweaks */
    @media (max-width:520px){
      .cols{ flex-direction:column; }
      fieldset > label{ width:100%; }
      .card{ padding:16px; }
      h1{ font-size:1.05rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Shinobi GG Password Generator</h1>

    <div class="output">
      <label for="password-output">Generated password</label>
      <input id="password-output" type="text" readonly placeholder="Your code will appear here" />
    </div>

    <form id="password-form">
      <div class="cols">
        <div class="col left">
          <fieldset>
            <legend>Ninjas</legend>
            <label><input type="checkbox" name="blueNinja" /> Blue Ninja</label>
            <label><input type="checkbox" name="yellowNinja" /> Yellow Ninja</label>
            <label><input type="checkbox" name="pinkNinja" /> Pink Ninja</label>
            <label><input type="checkbox" name="greenNinja" /> Green Ninja</label>
          </fieldset>

          <fieldset>
            <legend>Health</legend>
            <label for="health">Choose health value</label>
            <select id="health" name="health">
              <option value="4">4</option>
              <option value="6">6</option>
              <option value="8">8</option>
              <option value="10">10</option>
              <option value="12">12</option>
            </select>
          </fieldset>
        </div>

        <div class="col right">
          <fieldset>
            <legend>Crystals</legend>
            <label><input type="checkbox" name="yellowCrystal" /> Yellow Crystal</label>
            <label><input type="checkbox" name="greenCrystal" /> Green Crystal</label>
            <label><input type="checkbox" name="blueCrystal" /> Blue Crystal</label>
            <label><input type="checkbox" name="pinkCrystal" /> Pink Crystal</label>
          </fieldset>
        </div>
      </div>
    </form>
  </div>

  <script>
    function generatePassword({
      blueNinja = false,
      yellowNinja = false,
      pinkNinja = false,
      greenNinja = false,
      yellowCrystal = false,
      greenCrystal = false,
      blueCrystal = false,
      pinkCrystal = false,
      health = 4,
    } = {}) {
      let N = 0;
      if (blueNinja) N |= 0x1;
      if (yellowNinja) N |= 0x2;
      if (pinkNinja) N |= 0x4;
      if (greenNinja) N |= 0x8;

      let C = 0;
      if (yellowCrystal) C |= 0x1;
      if (greenCrystal) C |= 0x2;
      if (blueCrystal) C |= 0x4;
      if (pinkCrystal) C |= 0x8;

      const healthToBits = {
        4: 0x0,
        6: 0x1,
        8: 0x3,
        10: 0x7,
        12: 0xF,
      };

      if (!(health in healthToBits)) {
        throw new Error('Health must be one of: 4, 6, 8, 10, 12');
      }

      const H = healthToBits[health];
      const K = 1;

      const P0 = (N - 2 * K) & 0xF;
      const P1 = C;
      const P2 = (H + K) & 0xF;
      const P3 = (N + C + H) & 0xF;
      const P4 = K;

      return `${P0.toString(16).toUpperCase()}${P1.toString(16).toUpperCase()}${P2.toString(16).toUpperCase()}${P3.toString(16).toUpperCase()}${P4.toString(16).toUpperCase()}`;
    }

    const form = document.getElementById('password-form');
    const output = document.getElementById('password-output');

    function readOptions() {
      const formData = new FormData(form);
      return {
        blueNinja: formData.has('blueNinja'),
        yellowNinja: formData.has('yellowNinja'),
        pinkNinja: formData.has('pinkNinja'),
        greenNinja: formData.has('greenNinja'),
        yellowCrystal: formData.has('yellowCrystal'),
        greenCrystal: formData.has('greenCrystal'),
        blueCrystal: formData.has('blueCrystal'),
        pinkCrystal: formData.has('pinkCrystal'),
        health: Number(formData.get('health')),
      };
    }

    function updateOutput() {
      try{
        output.value = generatePassword(readOptions());
      }catch(e){
        output.value = '';
        console.error(e);
      }
    }

    // Generate on init
    document.addEventListener('DOMContentLoaded', updateOutput);

    // Generate whenever form inputs change
    form.addEventListener('change', updateOutput);
    form.addEventListener('input', updateOutput);
  </script>
</body>
</html>
